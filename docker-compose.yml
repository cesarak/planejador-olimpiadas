services:
  db:
    image: postgres:16
    container_name: planejador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: planejador_olimpiadas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d planejador_olimpiadas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
